<router-outlet></router-outlet>

<!-- Re-authentication modal for expired JWT -->
<app-login-modal
  [show]="showReAuthModal"
  [headerText]="'Session Expired'"
  [buttonText]="'Re-authenticate'"
  [buttonIcon]="'fas fa-lock'"
  [showModeSelector]="false"
  [prefilledUsername]="currentUsername"
  [disableUsername]="true"
  (connect)="onReAuthenticate($event)"
  (cancel)="onReAuthCancel()"
></app-login-modal>
