<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="page-title">
        <h3>Navigation Management</h3>
        <p class="text-muted">Manage roles, sections, and endpoints for your application</p>
      </div>
    </div>
  </div>
  
  <div class="row">
    <div class="col-lg-4 col-md-6" *ngFor="let option of navigationOptions">
      <div class="card navigation-card" (click)="navigateTo(option.route)" [attr.data-color]="option.color">
        <div class="card-body text-center">
          <div class="icon-wrapper mb-3">
            <i [class]="option.icon"></i>
          </div>
          <h4 class="mb-2">{{ option.title }}</h4>
          <p class="text-muted mb-0">{{ option.description }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
