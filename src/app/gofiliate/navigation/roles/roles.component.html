<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h4 class="mb-0">Role Management</h4>
          <button class="btn btn-success" (click)="createNewRole()" title="Create New Role">
            <i class="ti-plus"></i> Add New Role
          </button>
        </div>
        <div class="card-body">
          <div *ngIf="loading" class="text-center py-5">
            <div class="spinner-border" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>

          <div *ngIf="!loading && roles.length === 0" class="alert alert-info">
            No roles found.
          </div>

          <div *ngIf="!loading && roles.length > 0" class="table-responsive">
            <table class="table table-hover">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Role Name</th>
                  <th>Description</th>
                  <th>Type</th>
                  <th>Status</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let role of roles">
                  <td>{{ role.role_id }}</td>
                  <td><strong>{{ role.role_name }}</strong></td>
                  <td>{{ role.role_description }}</td>
                  <td>
                    <span *ngIf="role.is_guest === 1" class="badge bg-info me-1">
                      <i class="ti-user"></i> Guest
                    </span>
                    <span *ngIf="role.protected === 1" class="badge bg-warning">
                      <i class="ti-lock"></i> Protected
                    </span>
                    <span *ngIf="role.protected !== 1 && role.is_guest !== 1" class="text-muted">-</span>
                  </td>
                  <td>
                    <span class="badge" [class.bg-success]="role.status === 1" [class.bg-secondary]="role.status !== 1">
                      {{ role.status === 1 ? 'Active' : 'Inactive' }}
                    </span>
                  </td>
                  <td class="text-end">
                    <button class="btn btn-sm btn-primary me-2" 
                            (click)="editRole(role)"
                            title="Edit Role & Permissions">
                      <i class="ti-pencil"></i> Edit
                    </button>
                    <button class="btn btn-sm btn-danger" 
                            (click)="deleteRole(role)"
                            [disabled]="role.protected === 1"
                            title="Delete Role">
                      <i class="ti-trash"></i>
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
