<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Edit User</h2>
        <button class="btn btn-secondary" (click)="onCancel()">
          <i class="bi bi-arrow-left"></i> Back to Users
        </button>
      </div>

      <div *ngIf="loading" class="text-center">
        <div class="spinner-border" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>

      <div *ngIf="!loading" class="card">
        <div class="card-body">
          <div class="row">
            <!-- Form Column (full width) -->
            <div class="col-12">
              <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
            
            <!-- Profile Picture Section -->
            <div class="mb-4">
              <div class="profile-picture-circle">
                <img *ngIf="profilePicturePreview" [src]="profilePicturePreview" alt="Profile Picture">
                <i *ngIf="!profilePicturePreview" class="bi bi-person-circle"></i>
              </div>
            </div>

            <hr class="my-4">

            <div class="row">
              <!-- Left Column -->
              <div class="col-md-6">
                <h5 class="mb-3">Basic Information</h5>
                
                <div class="mb-3">
                  <label for="username" class="form-label">Username <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" id="username" formControlName="username">
                </div>

                <div class="mb-3">
                  <label for="first_name" class="form-label">First Name <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" id="first_name" formControlName="first_name">
                </div>

                <div class="mb-3">
                  <label for="last_name" class="form-label">Last Name <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" id="last_name" formControlName="last_name">
                </div>
              </div>

              <!-- Right Column -->
              <div class="col-md-6">
                <h5 class="mb-3">Permissions & Access</h5>

                <div class="mb-3">
                  <label for="role_id" class="form-label">Role <span class="text-danger">*</span></label>
                  <select class="form-select" id="role_id" formControlName="role_id">
                    <option [ngValue]="null">Select a role</option>
                    <option *ngFor="let role of roles" [ngValue]="role.role_id">
                      {{ role.role_name }}
                    </option>
                  </select>
                </div>

                <div class="mb-3">
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="has_managers" formControlName="has_managers">
                    <label class="form-check-label" for="has_managers">
                      Has Managers
                    </label>
                  </div>
                  <small class="form-text text-muted">Allow this user to have managers</small>
                </div>

                <div class="mb-3">
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="can_login" formControlName="can_login">
                    <label class="form-check-label" for="can_login">
                      Can Login
                    </label>
                  </div>
                  <small class="form-text text-muted">Allow this user to log into the system</small>
                </div>

                <div class="mb-3">
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="is_internal" formControlName="is_internal">
                    <label class="form-check-label" for="is_internal">
                      Internal User
                    </label>
                  </div>
                </div>

                <div class="mb-3" *ngIf="isGod">
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="is_god" formControlName="is_god">
                    <label class="form-check-label" for="is_god">
                      God User
                    </label>
                  </div>
                </div>

                <div class="mb-3">
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="status" formControlName="status">
                    <label class="form-check-label" for="status">
                      Active
                    </label>
                  </div>
                </div>
              </div>
            </div>

            <hr class="my-4">

            <div class="d-flex justify-content-between">
              <div>
                <button type="button" class="btn btn-warning me-2" (click)="resetPassword()">
                  <i class="bi bi-key"></i> Reset Password
                </button>
                <button type="button" class="btn btn-info" (click)="navigateToPoolAccess()">
                  <i class="bi bi-diagram-3"></i> Manage Pool Access
                </button>
              </div>
              <div>
                <button type="button" class="btn btn-secondary me-2" (click)="onCancel()">Cancel</button>
                <button type="submit" class="btn btn-primary" [disabled]="!userForm.valid">
                  <i class="bi bi-save"></i> Save Changes
                </button>
              </div>
            </div>
          </form>
        </div>  <!-- End col-12 (form) -->
      </div>
    </div>
  </div>
</div>
</div>

</div>
