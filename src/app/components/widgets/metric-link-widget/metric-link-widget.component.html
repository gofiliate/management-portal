<div class="metric-link-widget h-100">
  <!-- Loading State -->
  <div *ngIf="loading" class="card h-100 shadow-sm d-flex align-items-center justify-content-center">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <!-- Error State -->
  <div *ngIf="error && !loading" class="card h-100 shadow-sm bg-light">
    <div class="card-body d-flex align-items-center justify-content-center text-center">
      <div>
        <i class="fa fa-exclamation-triangle fa-2x text-muted mb-2"></i>
        <p class="text-muted mb-0">Unable to load data</p>
      </div>
    </div>
  </div>

  <!-- Metric Display -->
  <div 
    *ngIf="!loading && !error && config" 
    class="card h-100 shadow-sm metric-card"
    [class]="colorClass + ' ' + textColorClass"
    (click)="onClick()"
    role="button"
    tabindex="0"
    [attr.aria-label]="count + ' ' + label + '. Click to view details.'"
  >
    <div class="card-body d-flex align-items-center justify-content-between p-4">
      <!-- Icon and Count -->
      <div class="d-flex align-items-center">
        <i [class]="'fa ' + iconClass + ' fa-3x me-4 opacity-75'"></i>
        <div>
          <h2 class="mb-0 fw-bold display-4">{{ count }}</h2>
          <p class="mb-0 mt-1">{{ label }}</p>
        </div>
      </div>

      <!-- Arrow Indicator -->
      <div class="ms-3">
        <i class="fa fa-arrow-right fa-2x opacity-50"></i>
      </div>
    </div>
  </div>
</div>
