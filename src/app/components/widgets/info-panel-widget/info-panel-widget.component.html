<div class="info-panel-widget h-100">
  <div 
    class="card h-100 shadow-sm"
    [style.background-color]="backgroundColor"
    [style.border-color]="borderColor"
    [style.color]="textColor"
  >
    <div class="card-body d-flex flex-column">
      <!-- Header with Icon -->
      <div class="d-flex align-items-center mb-3">
        <i [class]="'fa ' + iconClass + ' fa-2x me-3'"></i>
        <h5 class="card-title mb-0 fw-bold" [style.color]="textColor">
          {{ headerText }}
        </h5>
      </div>

      <!-- Content -->
      <div class="card-text flex-grow-1" [style.color]="textColor">
        <p class="mb-0" [innerHTML]="contentText"></p>
      </div>
    </div>
  </div>
</div>
