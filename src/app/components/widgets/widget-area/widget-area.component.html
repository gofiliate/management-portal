<div class="widget-area-container">
  <!-- Loading State -->
  <div *ngIf="isLoading" class="text-center p-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading dashboard...</span>
    </div>
    <p class="mt-3 text-muted">Loading your dashboard...</p>
  </div>

  <!-- Error State -->
  <div *ngIf="error && !isLoading" class="alert alert-danger m-3" role="alert">
    <i class="fa fa-exclamation-triangle me-2"></i>
    {{ error }}
  </div>

  <!-- Dashboard Content -->
  <div *ngIf="!isLoading && !error && dashboardLayout" class="container-fluid p-3">
    <!-- Dashboard Header -->
    <div class="row mb-3" *ngIf="dashboardLayout.description">
      <div class="col-12">
        <h4 class="dashboard-title">{{ dashboardLayout.description }}</h4>
      </div>
    </div>

    <!-- Widget Rows -->
    <div 
      *ngFor="let row of dashboardLayout.rows; let rowIndex = index" 
      class="row mb-3"
      [hidden]="!isRowVisible(rowIndex)"
    >
      <div 
        *ngFor="let widget of row.widgets; let widgetIndex = index" 
        [ngClass]="getColClass(widget.col_width)"
        class="mb-3"
      >
        <app-dynamic-widget 
          [widgetData]="widget"
          (hasData)="onWidgetDataStatus(rowIndex, widgetIndex, $event)"
          (hideRow)="onWidgetHideRow(rowIndex, widgetIndex, $event)"
        ></app-dynamic-widget>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="dashboardLayout.rows.length === 0" class="text-center p-5">
      <i class="fa fa-inbox fa-3x text-muted mb-3"></i>
      <p class="text-muted">No widgets configured for this dashboard yet.</p>
    </div>
  </div>
</div>
