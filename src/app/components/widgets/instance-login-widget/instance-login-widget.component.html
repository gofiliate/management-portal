<div class="widget-card card h-100">
  <div class="card-header d-flex align-items-center">
    <i [class]="'fa ' + widgetData.icon + ' me-2'"></i>
    <span class="widget-title">{{ getDisplayTitle() }}</span>
  </div>

  <div class="card-body">
    <!-- Loading State -->
    <div *ngIf="isLoading" class="text-center py-4">
      <div class="spinner-border spinner-border-sm" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <!-- Error State -->
    <div *ngIf="error && !isLoading" class="alert alert-warning mb-0">
      <i class="fa fa-exclamation-triangle me-2"></i>
      {{ error }}
    </div>

    <!-- Widget Content -->
    <div *ngIf="!isLoading && !error">
      <!-- Show footer text if no instance is configured -->
      <p class="text-muted mb-3" *ngIf="!instanceData && widgetData.footer">
        {{ widgetData.footer }}
      </p>

      <!-- Instance Details -->
      <div *ngIf="instanceData" class="instance-details">
        <!-- Instance Logo -->
        <div *ngIf="instanceData.client_logo" class="text-center mb-3">
          <img 
            [src]="instanceData.client_logo" 
            [alt]="instanceData.instance_name + ' logo'"
            class="instance-logo"
          />
        </div>

        <div class="mb-3">
          <h5 class="instance-name">{{ instanceData.instance_name }}</h5>
          <p class="client-name text-muted mb-0">
            <small>{{ instanceData.client_name }}</small>
          </p>
        </div>

        <button 
          type="button" 
          class="btn btn-primary w-100"
          (click)="onLoginClick()"
        >
          <i class="fa fa-sign-in-alt me-2"></i>
          Login to Instance
        </button>
      </div>

      <!-- No Instance Configured -->
      <div *ngIf="!instanceData && !widgetData.reference_id" class="text-center py-3">
        <i class="fa fa-info-circle text-muted fa-2x mb-2"></i>
        <p class="text-muted mb-0">No instance configured</p>
      </div>
    </div>
  </div>

  <div class="card-footer text-muted" *ngIf="widgetData.footer && instanceData">
    <small>{{ widgetData.footer }}</small>
  </div>
</div>

<!-- Manager Selection Modal -->
<div class="modal fade show d-block" *ngIf="showManagerSelectionModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Select Account Manager</h5>
        <button type="button" class="btn-close" (click)="closeManagerModal()"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label for="managerSelect" class="form-label">Choose which account to login as:</label>
          <select 
            id="managerSelect" 
            class="form-select" 
            [(ngModel)]="selectedManagerUserId"
          >
            <option [ngValue]="null">-- Select a manager --</option>
            <option *ngFor="let manager of managers" [ngValue]="manager.user_id">
              {{ manager.full_name }} ({{ manager.username }}) - {{ manager.user_role }}
            </option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closeManagerModal()">
          Cancel
        </button>
        <button 
          type="button" 
          class="btn btn-primary" 
          (click)="proceedWithManagerOrCurrentUser()"
          [disabled]="!selectedManagerUserId"
        >
          Proceed to Login
        </button>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop fade show" *ngIf="showManagerSelectionModal"></div>

<!-- TOTP Challenge Component -->
<app-totp-challenge
  *ngIf="showTotpChallenge"
  [username]="loginUsername"
  [isVisible]="showTotpChallenge"
  (onSuccess)="handleTotpVerification($event)"
  (onCancel)="handleTotpCancel()"
></app-totp-challenge>
