<!-- Page Header -->
<app-page-header
  title="Client Onboarding"
  [breadcrumbs]="breadcrumbs">
</app-page-header>

<div class="container-fluid">
  <div class="row">
    <ng-container *ngFor="let option of onboardingOptions">
      <div class="col-lg-4 col-md-6" 
           *ngIf="option.route !== '/clients/onboarding/new' || actionGuard.canCreate()">
        <div class="card onboarding-card" 
             (click)="navigateTo(option.route)" 
             [attr.data-color]="option.color">
        <div class="card-body text-center">
          <div class="icon-wrapper mb-3">
            <i [class]="option.icon"></i>
          </div>
          <h4 class="mb-2">{{ option.title }}</h4>
          <p class="text-muted mb-0">{{ option.description }}</p>
        </div>
      </div>
    </div>
    </ng-container>
  </div>
</div>
