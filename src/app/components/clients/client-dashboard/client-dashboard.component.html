<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="page-title">
        <h3>Client Management</h3>
      </div>
    </div>
  </div>
  
  <div class="row">
    <div class="col-lg-4 col-md-6">
      <div class="card navigation-card" [routerLink]="['/clients/details', clientId]" data-color="primary">
        <div class="card-body text-center">
          <div class="icon-wrapper mb-3">
            <i class="fa fa-info-circle"></i>
          </div>
          <h4 class="mb-2">Details</h4>
          <p class="text-muted mb-0">View and edit client information</p>
        </div>
      </div>
    </div>
    
    <div class="col-lg-4 col-md-6">
      <div class="card navigation-card" [routerLink]="['/clients/instances', clientId]" data-color="success">
        <div class="card-body text-center">
          <div class="icon-wrapper mb-3">
            <i class="fa fa-th"></i>
          </div>
          <h4 class="mb-2">Instances</h4>
          <p class="text-muted mb-0">Manage client instances</p>
        </div>
      </div>
    </div>
  </div>
</div>
