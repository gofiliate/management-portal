<!-- Page Title -->
<div class="row mb-4">
  <div class="col-12">
    <div class="d-flex justify-content-between align-items-center">
      <h2>Client Instances</h2>
      <button class="btn btn-success" (click)="openModal()">
        <i class="fa fa-plus me-2"></i>
        Add New Instance
      </button>
    </div>
  </div>
</div>

<!-- Loading State -->
<div class="row" *ngIf="loading">
  <div class="col-12">
    <div class="text-center p-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-3 text-muted">Loading instances...</p>
    </div>
  </div>
</div>

<!-- Empty State -->
<div class="row" *ngIf="!loading && instances.length === 0">
  <div class="col-12">
    <div class="alert alert-info text-center">
      <i class="fa fa-info-circle me-2"></i>
      No instances found for this client
    </div>
  </div>
</div>

<!-- Instance Cards -->
<div class="row instance-grid" *ngIf="!loading && instances.length > 0">
  <div
    class="instance-col"
    *ngFor="let instance of instances"
  >
    <app-instance-card [instance]="instance"></app-instance-card>
  </div>
</div>

<!-- Add Instance Modal -->
<div class="modal-backdrop" *ngIf="showModal" (click)="closeModal()"></div>
<div class="modal-dialog-wrapper" *ngIf="showModal">
  <div class="modal-dialog">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h5 class="modal-title">Add New Instance</h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>
      <div class="modal-body">
        <form #instanceForm="ngForm">
          <div class="mb-3">
            <label for="instanceName" class="form-label">Instance Name <span class="text-danger">*</span></label>
            <input 
              type="text" 
              class="form-control" 
              id="instanceName"
              [(ngModel)]="newInstance.instance_name"
              name="instanceName"
              placeholder="Enter instance name"
              maxlength="255"
              pattern="[a-zA-Z0-9\s\-_]+"
              required
              title="Only letters, numbers, spaces, hyphens and underscores allowed"
            >
          </div>

          <div class="mb-3">
            <label for="clientLogo" class="form-label">Client Logo (Optional)</label>
            <input 
              type="url" 
              class="form-control" 
              id="clientLogo"
              [(ngModel)]="newInstance.client_logo"
              name="clientLogo"
              placeholder="Enter logo URL"
              maxlength="255"
              pattern="https?://.+"
              title="Please enter a valid URL starting with http:// or https://"
            >
          </div>
          
          <div class="mb-3">
            <label for="hostname" class="form-label">Instance Hostname <span class="text-danger">*</span></label>
            <input 
              type="text" 
              class="form-control" 
              id="hostname"
              [(ngModel)]="newInstance.hostname"
              name="hostname"
              placeholder="Enter instance hostname"
              maxlength="255"
              pattern="[a-zA-Z0-9\-_.]+"
              required
              title="Only letters, numbers, hyphens, underscores and dots allowed"
            >
          </div>
          
          <div class="mb-3">
            <label for="ipAddress" class="form-label">IP Address <span class="text-danger">*</span></label>
            <input 
              type="text" 
              class="form-control" 
              id="ipAddress"
              [(ngModel)]="newInstance.ip_address"
              name="ipAddress"
              placeholder="e.g., 192.168.1.100"
              maxlength="45"
              pattern="^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$|^(?:[0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}$"
              required
              title="Please enter a valid IPv4 or IPv6 address"
            >
          </div>
          
          <div class="mb-3">
            <label for="apiEndpoint" class="form-label">API Endpoint <span class="text-danger">*</span></label>
            <input 
              type="url" 
              class="form-control" 
              id="apiEndpoint"
              [(ngModel)]="newInstance.api_endpoint"
              name="apiEndpoint"
              placeholder="e.g., https://api.example.com"
              maxlength="255"
              pattern="https?://.+"
              required
              title="Please enter a valid URL starting with http:// or https://"
            >
          </div>
          
          <div class="mb-3">
            <label for="adEndpoint" class="form-label">Ad Endpoint (Optional)</label>
            <input 
              type="url" 
              class="form-control" 
              id="adEndpoint"
              [(ngModel)]="newInstance.ad_endpoint"
              name="adEndpoint"
              placeholder="e.g., https://ads.example.com"
              maxlength="255"
              pattern="https?://.+"
              title="Please enter a valid URL starting with http:// or https://"
            >
          </div>
          
          <div class="mb-3" *ngIf="isGod">
            <label for="apiKey" class="form-label">API Key <span class="text-danger">*</span></label>
            <input 
              type="text" 
              class="form-control" 
              id="apiKey"
              [(ngModel)]="newInstance.api_key"
              name="apiKey"
              placeholder="Enter API key"
              maxlength="255"
              pattern="[a-zA-Z0-9\-_]+"
              [required]="isGod"
              title="Only letters, numbers, hyphens and underscores allowed"
            >
          </div>
          
          <div class="mb-3" *ngIf="isGod">
            <label for="jwtKey" class="form-label">JWT Key (Optional)</label>
            <input 
              type="text" 
              class="form-control" 
              id="jwtKey"
              [(ngModel)]="newInstance.jwt_key"
              name="jwtKey"
              placeholder="Enter JWT key"
              maxlength="255"
              pattern="[a-zA-Z0-9\-_]+"
              title="Only letters, numbers, hyphens and underscores allowed"
            >
          </div>
          
          <div class="mb-3">
            <label for="heartbeatPort" class="form-label">Heartbeat Port (Optional)</label>
            <input 
              type="number" 
              class="form-control" 
              id="heartbeatPort"
              [(ngModel)]="newInstance.heartbeat_port"
              name="heartbeatPort"
              placeholder="e.g., 8080"
              min="1"
              max="65535"
              title="Enter a valid port number (1-65535)"
            >
          </div>
          
          <div class="mb-3">
            <label class="form-label d-block">Brand Mode</label>
            <div class="form-check form-switch">
              <input 
                class="form-check-input" 
                type="checkbox" 
                role="switch" 
                id="singleBrandSwitch"
                [ngModel]="newInstance.is_single_brand === 1"
                (ngModelChange)="newInstance.is_single_brand = $event ? 1 : 0"
                name="singleBrandSwitch"
              >
              <label class="form-check-label" for="singleBrandSwitch">
                {{ newInstance.is_single_brand === 1 ? 'Single Brand' : 'Multi Brand' }}
              </label>
            </div>
          </div>
          
          <div class="mb-3">
            <label class="form-label d-block">Environment</label>
            <div class="form-check form-switch">
              <input 
                class="form-check-input" 
                type="checkbox" 
                role="switch" 
                id="liveSwitch"
                [ngModel]="newInstance.is_live === 1"
                (ngModelChange)="newInstance.is_live = $event ? 1 : 0"
                name="liveSwitch"
              >
              <label class="form-check-label" for="liveSwitch">
                {{ newInstance.is_live === 1 ? 'Live' : 'Development' }}
              </label>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancel</button>
        <button 
          type="button" 
          class="btn btn-success" 
          (click)="submitInstance()"
          [disabled]="!instanceForm.form.valid"
        >
          <i class="fa fa-plus me-2"></i>
          Add Instance
        </button>
      </div>
    </div>
  </div>
</div>
