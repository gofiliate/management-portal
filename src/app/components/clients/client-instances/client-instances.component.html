<div class="container-fluid">
  <!-- Page Header -->
  <div class="row mb-4">
    <div class="col-12">
      <div class="d-flex justify-content-between align-items-center">
        <div class="page-title">
          <h3>Client Instances</h3>
        </div>
        <button 
          class="btn btn-success" 
          *ngIf="actionGuard.canCreate()"
          (click)="openModal()"
        >
          <i class="fa fa-plus me-2"></i>
          Add Instance
        </button>
      </div>
    </div>
  </div>

  <!-- Summary Stats -->
  <div class="row mb-4" *ngIf="!loading && instances.length > 0">
    <div class="col-lg-3 col-md-6 mb-3">
      <div class="stat-card">
        <div class="stat-icon bg-primary">
          <i class="fa fa-server"></i>
        </div>
        <div class="stat-content">
          <div class="stat-value">{{ totalInstances }}</div>
          <div class="stat-label">Total Instances</div>
        </div>
      </div>
    </div>
    <div class="col-lg-3 col-md-6 mb-3">
      <div class="stat-card">
        <div class="stat-icon bg-success">
          <i class="fa fa-check-circle"></i>
        </div>
        <div class="stat-content">
          <div class="stat-value">{{ activeInstances }}</div>
          <div class="stat-label">Active</div>
        </div>
      </div>
    </div>
    <div class="col-lg-3 col-md-6 mb-3">
      <div class="stat-card">
        <div class="stat-icon bg-info">
          <i class="fa fa-rocket"></i>
        </div>
        <div class="stat-content">
          <div class="stat-value">{{ liveInstances }}</div>
          <div class="stat-label">Live</div>
        </div>
      </div>
    </div>
    <div class="col-lg-3 col-md-6 mb-3">
      <div class="stat-card">
        <div class="stat-icon bg-warning">
          <i class="fa fa-code"></i>
        </div>
        <div class="stat-content">
          <div class="stat-value">{{ devInstances }}</div>
          <div class="stat-label">Development</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Loading State -->
  <div class="row" *ngIf="loading">
    <div class="col-12">
      <div class="text-center p-5">
        <i class="fa fa-spinner fa-spin fa-3x text-primary"></i>
        <p class="mt-3 text-muted">Loading instances...</p>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div class="row" *ngIf="!loading && instances.length === 0">
    <div class="col-12">
      <div class="alert alert-info text-center">
        <i class="fa fa-info-circle me-2"></i>
        No instances found for this client
      </div>
    </div>
  </div>

  <!-- Instance Cards -->
  <div class="row" *ngIf="!loading && instances.length > 0">
    <div class="instance-col" *ngFor="let instance of instances">
      <app-instance-card [instance]="instance"></app-instance-card>
    </div>
  </div>
</div>

<!-- Add Instance Modal -->
<div class="modal-backdrop" *ngIf="showModal" (click)="closeModal()"></div>
<div class="modal-dialog-wrapper" *ngIf="showModal">
  <div class="modal-dialog" (click)="$event.stopPropagation()">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="modal-title">Add New Instance</h4>
        <button type="button" class="btn-close" (click)="closeModal()" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form #instanceForm="ngForm">
          <div class="mb-3">
            <label for="instanceName" class="form-label">Instance Name <span class="text-danger">*</span></label>
            <input 
              type="text" 
              class="form-control" 
              id="instanceName"
              [(ngModel)]="newInstance.instance_name"
              name="instanceName"
              placeholder="Enter instance name"
              required
              maxlength="255"
            >
          </div>
          
          <div class="mb-3">
            <label for="clientLogo" class="form-label">Client Logo URL (Optional)</label>
            <input 
              type="url" 
              class="form-control" 
              id="clientLogo"
              [(ngModel)]="newInstance.client_logo"
              name="clientLogo"
              placeholder="https://example.com/logo.png"
              maxlength="500"
            >
            <small class="text-muted">URL to the client's logo image</small>
          </div>
          
          <div class="mb-3">
            <label for="hostname" class="form-label">Hostname <span class="text-danger">*</span></label>
            <input 
              type="text" 
              class="form-control" 
              id="hostname"
              [(ngModel)]="newInstance.hostname"
              name="hostname"
              placeholder="example.com"
              required
              maxlength="255"
            >
          </div>
          
          <div class="mb-3">
            <label for="ipAddress" class="form-label">IP Address <span class="text-danger">*</span></label>
            <input 
              type="text" 
              class="form-control" 
              id="ipAddress"
              [(ngModel)]="newInstance.ip_address"
              name="ipAddress"
              placeholder="192.168.1.1"
              required
              maxlength="45"
              pattern="^(?:[0-9]{1,3}\\.){3}[0-9]{1,3}$"
              title="Enter a valid IPv4 address"
            >
          </div>
          
          <div class="mb-3">
            <label for="apiEndpoint" class="form-label">API Endpoint <span class="text-danger">*</span></label>
            <input 
              type="url" 
              class="form-control" 
              id="apiEndpoint"
              [(ngModel)]="newInstance.api_endpoint"
              name="apiEndpoint"
              placeholder="https://api.example.com"
              required
              maxlength="500"
            >
            <small class="text-muted">Full URL to the API endpoint</small>
          </div>
          
          <div class="mb-3">
            <label for="adEndpoint" class="form-label">Ad Endpoint (Optional)</label>
            <input 
              type="url" 
              class="form-control" 
              id="adEndpoint"
              [(ngModel)]="newInstance.ad_endpoint"
              name="adEndpoint"
              placeholder="https://ads.example.com"
              maxlength="500"
            >
          </div>
          
          <div class="mb-3" *ngIf="isGod">
            <label for="apiKey" class="form-label">API Key <span class="text-danger">*</span></label>
            <input 
              type="text" 
              class="form-control" 
              id="apiKey"
              [(ngModel)]="newInstance.api_key"
              name="apiKey"
              placeholder="Enter API key"
              maxlength="255"
              pattern="[a-zA-Z0-9\\-_]+"
              [required]="isGod"
              title="Only letters, numbers, hyphens and underscores allowed"
            >
          </div>
          
          <div class="mb-3" *ngIf="isGod">
            <label for="jwtKey" class="form-label">JWT Key (Optional)</label>
            <input 
              type="text" 
              class="form-control" 
              id="jwtKey"
              [(ngModel)]="newInstance.jwt_key"
              name="jwtKey"
              placeholder="Enter JWT key"
              maxlength="255"
              pattern="[a-zA-Z0-9\\-_]+"
              title="Only letters, numbers, hyphens and underscores allowed"
            >
          </div>
          
          <div class="mb-3">
            <label for="heartbeatPort" class="form-label">Heartbeat Port (Optional)</label>
            <input 
              type="number" 
              class="form-control" 
              id="heartbeatPort"
              [(ngModel)]="newInstance.heartbeat_port"
              name="heartbeatPort"
              placeholder="e.g., 8080"
              min="1"
              max="65535"
              title="Enter a valid port number (1-65535)"
            >
          </div>
          
          <div class="mb-3">
            <label class="form-label d-block">Brand Mode</label>
            <div class="form-check form-switch">
              <input 
                class="form-check-input" 
                type="checkbox" 
                role="switch" 
                id="singleBrandSwitch"
                [ngModel]="newInstance.is_single_brand === 1"
                (ngModelChange)="newInstance.is_single_brand = $event ? 1 : 0"
                name="singleBrandSwitch"
              >
              <label class="form-check-label" for="singleBrandSwitch">
                {{ newInstance.is_single_brand === 1 ? 'Single Brand' : 'Multi Brand' }}
              </label>
            </div>
          </div>
          
          <div class="mb-3">
            <label class="form-label d-block">Environment</label>
            <div class="form-check form-switch">
              <input 
                class="form-check-input" 
                type="checkbox" 
                role="switch" 
                id="liveSwitch"
                [ngModel]="newInstance.is_live === 1"
                (ngModelChange)="newInstance.is_live = $event ? 1 : 0"
                name="liveSwitch"
              >
              <label class="form-check-label" for="liveSwitch">
                {{ newInstance.is_live === 1 ? 'Live' : 'Development' }}
              </label>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancel</button>
        <button 
          type="button" 
          class="btn btn-success" 
          (click)="submitInstance()"
          [disabled]="!instanceForm.form.valid"
        >
          <i class="fa fa-plus me-2"></i>
          Add Instance
        </button>
      </div>
    </div>
  </div>
</div>
