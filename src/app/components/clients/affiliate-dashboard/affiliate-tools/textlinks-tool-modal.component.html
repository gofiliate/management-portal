<div class="modal-backdrop" *ngIf="show" (click)="onClose()"></div>
<div class="modal-dialog-wrapper" *ngIf="show">
  <div class="modal-dialog modal-xl">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h5 class="modal-title">
          <i class="fa fa-link me-2"></i>
          Text Links
        </h5>
        <button type="button" class="btn-close" (click)="onClose()"></button>
      </div>

      <div class="modal-body">
        <!-- Loading State -->
        <div *ngIf="isLoading" class="text-center py-5">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>

        <!-- No Landing Pages Warning -->
        <div *ngIf="!isLoading && !hasLandingPages" class="alert alert-warning">
          <i class="fa fa-exclamation-triangle me-2"></i>
          <strong>No Landing Pages Available</strong>
          <p class="mb-0">You need to <strong>SYNC Landing Pages for this Instance</strong> before you can generate text links. Please contact your administrator to sync landing pages.</p>
        </div>

        <!-- Textlinks Interface -->
        <div *ngIf="!isLoading && hasLandingPages">
          <!-- Landing Pages Section -->
          <div class="card mb-3">
            <div class="card-header">
              <h6 class="section-title mb-0">Landing Pages</h6>
            </div>
            <div class="card-body">
              <div class="row">
                <!-- Brand Selection (only if multiple brands) -->
                <div class="col-md-3 mb-3" *ngIf="showBrandSelect">
                  <label for="brand" class="form-label">Brand</label>
                  <select 
                    class="form-select" 
                    id="brand"
                    [value]="selectedBrand || ''" 
                    (change)="onBrandChange($event)"
                  >
                    <option value="">Choose Brand</option>
                    <option *ngFor="let brand of brands" [value]="brand.brand_id">
                      {{ brand.brand_name }}
                    </option>
                  </select>
                </div>

                <!-- Landing Page Selection -->
                <div 
                  [class.col-md-3]="showBrandSelect" 
                  [class.col-md-4]="!showBrandSelect"
                  class="mb-3"
                >
                  <label for="landingPage" class="form-label">Landing Page</label>
                  <select 
                    class="form-select" 
                    id="landingPage"
                    [value]="selectedTextlink || ''" 
                    (change)="onTextlinkChange($event)"
                  >
                    <option value="">Choose Landing Page</option>
                    <option *ngFor="let textlink of filteredTextlinks" [value]="textlink.link_id">
                      {{ textlink.link_description }}
                    </option>
                  </select>
                </div>

                <!-- Commission Plan Selection -->
                <div 
                  [class.col-md-3]="showBrandSelect" 
                  [class.col-md-4]="!showBrandSelect"
                  class="mb-3"
                >
                  <label for="commission" class="form-label">Commission Plan</label>
                  <select 
                    class="form-select" 
                    id="commission"
                    [value]="selectedCommission || ''" 
                    (change)="onCommissionChange($event)"
                  >
                    <option value="">Choose Commission Plan</option>
                    <option *ngFor="let commission of filteredCommissions" [value]="commission.commission_id">
                      {{ commission.internal_description }}
                    </option>
                  </select>
                </div>

                <!-- Campaign Selection -->
                <div 
                  [class.col-md-3]="showBrandSelect" 
                  [class.col-md-4]="!showBrandSelect"
                  class="mb-3"
                >
                  <label for="campaign" class="form-label">Campaign</label>
                  <select 
                    class="form-select" 
                    id="campaign"
                    [value]="selectedCampaign || ''" 
                    (change)="onCampaignChange($event)"
                  >
                    <option value="">Choose Campaign</option>
                    <option *ngFor="let campaign of campaigns" [value]="campaign.campaign_id">
                      {{ campaign.campaign_name }}
                    </option>
                  </select>
                </div>
              </div>

              <!-- Add Campaign Button -->
              <button 
                type="button" 
                class="btn btn-primary btn-sm"
                (click)="showAddCampaignModal()"
              >
                <i class="fa fa-plus me-2"></i>
                Add Campaign
              </button>

              <!-- Generated Link Output -->
              <div *ngIf="showOutput" class="mt-3">
                <div class="form-check mb-2">
                  <input 
                    type="checkbox" 
                    class="form-check-input" 
                    id="dynamicParams"
                    [checked]="includeDynamicParams" 
                    (change)="onIncludeDynamicParamsChange($event)"
                  >
                  <label class="form-check-label" for="dynamicParams">
                    Include Dynamic Parameters
                  </label>
                </div>
                <div class="input-group">
                  <input 
                    type="text" 
                    [value]="generatedTextlink" 
                    class="form-control" 
                    readonly
                  >
                  <button 
                    class="btn btn-outline-success" 
                    type="button" 
                    (click)="copyToClipboard(generatedTextlink)"
                  >
                    <i class="fa fa-copy me-2"></i>
                    Copy
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Geo Links Section -->
          <div *ngIf="geoGroups && geoGroups.length > 0" class="card">
            <div class="card-header">
              <h6 class="section-title mb-0">Geo Links</h6>
            </div>
            <div class="card-body">
              <div class="row">
                <!-- Geo Group Selection -->
                <div class="col-md-6 mb-3">
                  <label for="geoGroup" class="form-label">Geo Location Group</label>
                  <select 
                    class="form-select" 
                    id="geoGroup"
                    [value]="selectedGeoGroup || ''" 
                    (change)="onGeoGroupChange($event)"
                  >
                    <option value="">Geo Location Group</option>
                    <ng-container *ngFor="let group of geoGroups">
                      <option 
                        *ngIf="group.status === 1"
                        [value]="group.geo_id"
                      >
                        {{ group.internal_description }}
                      </option>
                    </ng-container>
                  </select>
                </div>

                <!-- Campaign Selection for Geo -->
                <div class="col-md-6 mb-3">
                  <label for="geoCampaign" class="form-label">Campaign</label>
                  <select 
                    class="form-select" 
                    id="geoCampaign"
                    [value]="selectedGeoCampaign || ''" 
                    (change)="onGeoCampaignChange($event)"
                  >
                    <option value="">Choose Campaign</option>
                    <option *ngFor="let campaign of campaigns" [value]="campaign.campaign_id">
                      {{ campaign.campaign_name }}
                    </option>
                  </select>
                </div>
              </div>

              <!-- Geo Link Output -->
              <div *ngIf="showGeoOutput" class="mt-3">
                <div class="form-check mb-2">
                  <input 
                    type="checkbox" 
                    class="form-check-input" 
                    id="geoDynamicParams"
                    [checked]="includeGeoDynamicParams" 
                    (change)="onIncludeGeoDynamicParamsChange($event)"
                  >
                  <label class="form-check-label" for="geoDynamicParams">
                    Include Dynamic Parameters
                  </label>
                </div>
                <div class="input-group">
                  <input 
                    type="text" 
                    [value]="generatedGeoLink" 
                    class="form-control" 
                    readonly
                  >
                  <button 
                    class="btn btn-outline-success" 
                    type="button" 
                    (click)="copyToClipboard(generatedGeoLink)"
                  >
                    <i class="fa fa-copy me-2"></i>
                    Copy
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="onClose()">Close</button>
      </div>
    </div>
  </div>
</div>

<!-- Campaign Modal -->
<div class="modal-backdrop campaign-backdrop" *ngIf="showCampaignModal" (click)="hideAddCampaignModal()"></div>
<div class="modal-dialog-wrapper campaign-modal-wrapper" *ngIf="showCampaignModal">
  <div class="modal-dialog modal-sm">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h5 class="modal-title">Add Campaign</h5>
        <button type="button" class="btn-close" (click)="hideAddCampaignModal()"></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="campaignName" class="form-label">Campaign Name</label>
          <input 
            type="text" 
            [(ngModel)]="newCampaignName" 
            class="form-control" 
            id="campaignName"
            (keyup.enter)="createCampaign()"
            placeholder="Enter campaign name"
          >
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="hideAddCampaignModal()">Cancel</button>
        <button 
          type="button" 
          class="btn btn-primary" 
          (click)="createCampaign()"
          [disabled]="!newCampaignName.trim()"
        >
          <i class="fa fa-save me-2"></i>
          Save
        </button>
      </div>
    </div>
  </div>
</div>
