<div class="modal-backdrop" *ngIf="show" (click)="onClose()"></div>
<div class="modal-dialog-wrapper" *ngIf="show">
  <div class="modal-dialog">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h5 class="modal-title">
          <i class="fa fa-key me-2"></i>
          Change Password
        </h5>
        <button type="button" class="btn-close" (click)="onClose()"></button>
      </div>

      <div class="modal-body">
        <div class="alert alert-info">
          <i class="fa fa-info-circle me-2"></i>
          Change the affiliate account password below. The affiliate will be able to log in with the new password immediately.
        </div>

        <div class="row mb-3">
          <div class="col-md-12">
            <label for="newPassword" class="form-label">New Password</label>
            <input 
              type="text" 
              class="form-control" 
              id="newPassword"
              [(ngModel)]="newPassword" 
              placeholder="Enter new password"
              name="newPassword"
            >
            <small class="form-text text-muted">
              Enter a strong password for the affiliate account.
            </small>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-12">
            <div class="form-check">
              <input 
                type="checkbox" 
                class="form-check-input" 
                id="sendEmailNotification"
                [(ngModel)]="sendEmailNotification"
                name="sendEmailNotification"
              >
              <label class="form-check-label" for="sendEmailNotification">
                Send email notification to affiliate
              </label>
            </div>
            <small class="form-text text-muted">
              When checked, an email will be sent to the affiliate with their new password.
            </small>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="onClose()">Cancel</button>
        <button 
          type="button" 
          class="btn btn-primary" 
          (click)="changePassword()" 
          [disabled]="!newPassword"
        >
          <i class="fa fa-save me-2"></i>
          Change Password
        </button>
      </div>
    </div>
  </div>
</div>
