<div class="card">
  <div class="card-header">
    <h5 class="mb-0">Platform Management</h5>
  </div>
  <div class="card-body">
    <div class="alert alert-warning mb-3" *ngIf="!hasLinkedToken">
      <i class="fa fa-exclamation-triangle me-2"></i>
      Connect a platform administrator account to access syncing and platform management features.
    </div>
    
    <div class="row">
      <div class="col-lg-3 col-md-4 col-sm-6 mb-3" *ngFor="let action of platformActions">
        <div 
          class="card platform-action-card" 
          (click)="onActionClick(action.section)"
          [attr.data-color]="action.color"
          [class.disabled]="action.section !== 'instance-details' && !hasLinkedToken"
        >
          <div class="card-body text-center">
            <div class="icon-wrapper mb-3">
              <i [class]="action.icon"></i>
            </div>
            <h5 class="mb-2">{{ action.title }}</h5>
            <p class="text-muted mb-0">{{ action.description }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
