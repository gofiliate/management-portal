<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="page-title">
        <h3>Clients Dashboard</h3>
        <p class="text-muted">Select a client to manage</p>
      </div>
    </div>
  </div>
  
  <div class="row" *ngIf="loading">
    <div class="col-12 text-center py-5">
      <i class="fa fa-spinner fa-spin fa-3x text-primary"></i>
      <p class="mt-3 text-muted">Loading clients...</p>
    </div>
  </div>

  <div class="row" *ngIf="!loading && clients.length === 0">
    <div class="col-12">
      <div class="alert alert-info">
        <i class="fa fa-info-circle me-2"></i>
        No clients found. Please contact an administrator.
      </div>
    </div>
  </div>
  
  <div class="row" *ngIf="!loading && clients.length > 0">
    <!-- Add New Client Card -->
    <div class="col-lg-3 col-md-4 col-sm-6">
      <div class="card client-card add-client-card" (click)="navigateToOnboarding()">
        <div class="card-body text-center">
          <div class="icon-wrapper mb-3">
            <i class="fa fa-plus-circle"></i>
          </div>
          <h5 class="mb-0">Add New Client</h5>
        </div>
      </div>
    </div>
    
    <!-- Existing Clients -->
    <div class="col-lg-3 col-md-4 col-sm-6" *ngFor="let client of clients">
      <div class="card client-card" (click)="navigateToClient(client.client_id)">
        <div class="card-body text-center">
          <!-- Public Badge -->
          <div class="badge-container" *ngIf="client.is_public === 1">
            <span class="badge bg-success">
              <i class="fa fa-globe me-1"></i>Public
            </span>
          </div>
          
          <div class="icon-wrapper mb-3" *ngIf="!client.logo_url">
            <i class="fa fa-building"></i>
          </div>
          <div class="logo-wrapper mb-3" *ngIf="client.logo_url">
            <img [src]="client.logo_url" [alt]="client.client_name" class="client-logo">
          </div>
          <h5 class="mb-0">{{ client.client_name }}</h5>
        </div>
      </div>
    </div>
  </div>
</div>
